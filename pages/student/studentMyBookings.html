<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings</title>

<style>
/* Base */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f9fafb;
    margin: 0;
    color: #1f2937;
}

/* Layout */
.main {
    display: flex;
    gap: 30px;
    padding: 30px;
}

.left { flex: 1; }
.right { width: 350px; }

/* Header */
h2 {
    font-size: 32px;
    font-weight: 800;
}
.orange { color: #f97316; }

/* Card */
.card {
    background: white;
    border-radius: 18px;
    padding: 18px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

/* Inputs */
input, select {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #f97316;
    box-shadow: 0 0 0 2px rgba(249,115,22,0.2);
}

/* Filters */
.filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
}

.filters button {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 11px;
    font-weight: bold;
    background: white;
    color: #6b7280;
    cursor: pointer;
    transition: 0.2s;
}

.filters button.active {
    background: #f97316;
    color: white;
    box-shadow: 0 4px 12px rgba(249,115,22,0.3);
}

.filters button:hover {
    background: #f3f4f6;
}

/* Table */
.table-container {
    margin-top: 10px;
    overflow-y: auto;
    max-height: 400px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    font-size: 11px;
    color: #9ca3af;
    padding: 12px;
    background: #f9fafb;
}

td {
    padding: 14px;
    font-size: 13px;
    border-top: 1px solid #f3f4f6;
}

tr:hover {
    background: #fff7ed;
    cursor: pointer;
}

/* Status */
.status {
    font-size: 10px;
    font-weight: bold;
    padding: 4px 8px;
    border-radius: 6px;
    background: #dbeafe;
    color: #2563eb;
}

/* Sidebar */
.sidebar {
    position: sticky;
    top: 20px;
}

.empty {
    text-align: center;
    color: #9ca3af;
    padding: 40px;
    border: 2px dashed #e5e7eb;
    border-radius: 20px;
}

.details {
    display: none;
}

.details.active {
    display: block;
}

/* Labels */
.label {
    font-size: 10px;
    color: #9ca3af;
    font-weight: bold;
}

.value {
    font-size: 14px;
    font-weight: 600;
}

/* Button */
.close-btn {
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #f97316;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="main">

<div class="left">

    <h2>My Bookings<span class="orange">.</span></h2>

    <div class="card">
        <input id="search" placeholder="Search...">
        <br><br>
        <select id="sort">
            <option value="desc">Newest First</option>
            <option value="asc">Oldest First</option>
        </select>
    </div>

    <div class="card filters" id="filters"></div>

    <div class="card table-container">
        <table>
            <thead>
                <tr>
                    <th>Item / Purpose</th>
                    <th>Supervisor</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>

<div class="right sidebar">

    <div class="card">
        <div id="empty" class="empty">Click a booking</div>

        <div id="details" class="details">
            <h3>Booking Details</h3>

            <p class="label">Item</p>
            <p class="value" id="dItem"></p>

            <p class="label">Purpose</p>
            <p id="dPurpose"></p>

            <p class="label">Supervisor</p>
            <p id="dSupervisor"></p>

            <p class="label">Status</p>
            <p id="dStatus"></p>

            <button class="close-btn" onclick="clearDetails()">Close</button>
        </div>
    </div>

</div>

</div>

<script>
const bookings = [
    {
        booking_id: 5,
        Item_Name: "Liquid Chromatography-Mass Spectrometry",
        purpose: "for the research",
        SupervisorName: "Jaydee Ballaho",
        date: "Apr 03, 2026",
        time: "01:55 PM",
        status: "Claimed"
    },
    {
        booking_id: 4,
        Item_Name: "Next-Generation DNA Sequencer",
        purpose: "DNA analysis",
        SupervisorName: "Jaydee Ballaho",
        date: "Apr 03, 2026",
        time: "01:00 PM",
        status: "Claimed"
    }
];

const statuses = ["All","Pending","Approved","Prepared","Denied","Claimed","Completed","Cancelled"];
let activeStatus = "All";

const table = document.getElementById("table");
const search = document.getElementById("search");
const sort = document.getElementById("sort");
const filters = document.getElementById("filters");

statuses.forEach(s => {
    const btn = document.createElement("button");
    btn.textContent = s;
    btn.onclick = () => {
        activeStatus = s;
        document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
    };
    filters.appendChild(btn);
});

function render() {
    let list = bookings.filter(b => {
        return (
            (b.Item_Name.toLowerCase().includes(search.value.toLowerCase()) ||
            b.purpose.toLowerCase().includes(search.value.toLowerCase())) &&
            (activeStatus === "All" || b.status === activeStatus)
        );
    });

    list.sort((a,b)=> sort.value==="asc"?a.booking_id-b.booking_id:b.booking_id-a.booking_id);

    table.innerHTML = "";

    list.forEach(b => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td><b>${b.Item_Name}</b><br><small>${b.purpose}</small></td>
            <td>${b.SupervisorName}</td>
            <td>${b.date}<br>${b.time}</td>
            <td><span class="status">${b.status}</span></td>
        `;

        tr.onclick = () => showDetails(b);
        table.appendChild(tr);
    });
}

function showDetails(b){
    document.getElementById("details").classList.add("active");
    document.getElementById("empty").style.display="none";

    dItem.textContent=b.Item_Name;
    dPurpose.textContent=b.purpose;
    dSupervisor.textContent=b.SupervisorName;
    dStatus.textContent=b.status;
}

function clearDetails(){
    document.getElementById("details").classList.remove("active");
    document.getElementById("empty").style.display="block";
}

search.oninput = render;
sort.onchange = render;

render();
</script>

</body>
</html>
