<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings</title>

<link rel="stylesheet" href="studentMyBookings.css">
</head>

<body>

<div class="main">

<div class="left">

    <h2>My Bookings<span class="orange">.</span></h2>

    <div class="card">
        <input id="search" placeholder="Search...">
        <br><br>
        <select id="sort">
            <option value="desc">Newest First</option>
            <option value="asc">Oldest First</option>
        </select>
    </div>

    <div class="card filters" id="filters"></div>

    <div class="card table-container">
        <table>
            <thead>
                <tr>
                    <th>Item / Purpose</th>
                    <th>Supervisor</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>

<div class="right sidebar">

    <div class="card">
        <div id="empty" class="empty">Click a booking</div>

        <div id="details" class="details">
            <h3>Booking Details</h3>

            <p class="label">Item</p>
            <p class="value" id="dItem"></p>

            <p class="label">Purpose</p>
            <p id="dPurpose"></p>

            <p class="label">Supervisor</p>
            <p id="dSupervisor"></p>

            <p class="label">Status</p>
            <p id="dStatus"></p>

            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

</div>

</div>

<script src="studentMyBookings.js"></script>
</body>
</html>
