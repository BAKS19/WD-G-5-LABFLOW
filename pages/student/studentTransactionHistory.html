<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Slips</title>

<link rel="stylesheet" href="studentTransactionHistory.css">
</head>

<body>

<main>

<div class="left">

    <div>
        <h2>My Slips.</h2>
        <div class="subtitle">A record of your borrowing history.</div>
    </div>

    <div class="card">
        <input id="search" placeholder="Search slip, activity, purpose...">
    </div>

    <div class="tabs" id="tabs"></div>

    <table>
        <thead>
            <tr>
                <th>Activity</th>
                <th>Date</th>
                <th style="text-align:center;">Status</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

</div>

<aside class="right">
    <div id="empty" class="empty">Click on a slip to view details.</div>

    <div id="receipt" style="display:none;">
        <h3 id="r-title"></h3>
        <div id="r-date"></div>
        <div id="r-status"></div>
        <p id="r-remarks"></p>

        <h4>Items</h4>
        <div id="r-items"></div>
    </div>
</aside>

</main>

<script src="studentTransactionHistory.js"></script>
</body>
</html>
