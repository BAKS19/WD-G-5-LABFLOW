<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Liabilities Dashboard</title>

<link rel="stylesheet" href="studentMyLiabilities.css">
</head>

<body>

<div class="main">

<div class="left">

<h2>My <span class="orange">Liabilities.</span></h2>
<p style="color:#94a3b8; font-size:12px;">
A record of your unresolved and settled damage reports.
</p>

<br>

<div class="card table-container">
<table>
<thead>
<tr>
<th>Item</th>
<th>Damage</th>
<th>Date Logged</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>
</div>

</div>

<div class="right sidebar">

<div id="emptyState" class="empty">
    <h3>Select a Case</h3>
    <p>Click a row to view details</p>
</div>

<div id="details" class="card details">

<div class="details-header">
    <h3>Case Details</h3>
    <button class="close-btn" id="closeBtn">Close</button>
</div>

<div style="padding:20px; overflow-y:auto;">

    <div>
        <div class="label">Item Name</div>
        <div id="dItem" class="value"></div>
    </div>

    <br>

    <div>
        <div class="label">Damage Notes</div>
        <div id="dNotes" class="box"></div>
    </div>

    <br>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div>
            <div class="label">Settlement</div>
            <div id="dSettlement" class="value"></div>
        </div>
        <div>
            <div class="label">Resolver</div>
            <div id="dResolver" class="value"></div>
        </div>
    </div>

</div>

</div>

</div>

</div>

<script src="studentMyLiabilities.js"></script>
</body>
</html>
