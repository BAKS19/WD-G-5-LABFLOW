<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Liabilities Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @keyframes reveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-reveal { animation: reveal 0.5s ease-out forwards; }
        .sticky-sidebar { position: sticky; top: 2rem; height: calc(100vh - 4rem); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

    <main class="p-8 flex flex-col lg:flex-row gap-8 animate-reveal" x-data="liabilityApp()">
        
        <div class="flex-1 flex flex-col gap-6">
            <header class="mb-2">
                <h2 class="text-4xl font-extrabold text-gray-800 tracking-tighter">My <span class="text-orange-500">Liabilities.</span></h2>
                <p class="text-slate-400 font-medium text-xs">A record of your unresolved and settled damage reports.</p>
            </header>

            <div class="bg-white rounded-2xl shadow-lg border border-gray-200/50 flex-1 flex flex-col overflow-hidden">
                <div class="overflow-y-auto flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 border-b border-gray-100 sticky top-0">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Item</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Damage</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Date Logged</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <template x-for="item in liabilities" :key="item.damage_id">
                                <tr @click="selectedCase = item" 
                                    class="hover:bg-orange-50/50 transition-colors cursor-pointer"
                                    :class="selectedCase?.damage_id === item.damage_id ? 'bg-orange-50' : ''">
                                    <td class="px-6 py-4">
                                        <p class="font-bold text-gray-800 text-sm" x-text="item.Item_Name"></p>
                                        <p class="text-xs text-gray-500" x-text="'Slip #' + item.session_id"></p>
                                    </td>
                                    <td class="px-6 py-4">
                                        <p class="font-bold text-gray-800 text-sm" x-text="item.damage_type"></p>
                                        <p class="text-xs text-gray-500" x-text="'Qty: ' + item.qty_damaged"></p>
                                    </td>
                                    <td class="px-6 py-4 text-xs text-gray-500 font-medium" x-text="item.logged_at"></td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="px-2 py-1 rounded-md text-[9px] font-black uppercase"
                                              :class="item.status === 'Resolved' ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'" 
                                              x-text="item.status"></span>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <aside class="w-full lg:w-96 sticky-sidebar">
            <div id="details-panel-container" class="h-full">
                
                <div x-show="!selectedCase" class="h-full flex flex-col items-center justify-center text-center p-8 text-slate-400 border-2 border-dashed border-slate-200 rounded-3xl">
                    <svg class="w-16 h-16 text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <h3 class="font-bold text-slate-500">Select a Case</h3>
                    <p class="text-sm mt-1">Click on a row to view its details here.</p>
                </div>

                <div x-show="selectedCase" class="h-full bg-white rounded-3xl shadow-xl border border-gray-100 flex flex-col overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="font-bold text-lg text-gray-800">Case Details</h3>
                        <button @click="selectedCase = null" class="text-gray-400 hover:text-gray-600">Close</button>
                    </div>
                    <div class="p-6 overflow-y-auto">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Item Name</label>
                                <p class="text-sm font-bold text-gray-800" x-text="selectedCase?.Item_Name"></p>
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Damage Notes</label>
                                <p class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg mt-1" x-text="selectedCase?.notes"></p>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Settlement</label>
                                    <p class="text-sm font-semibold capitalize text-gray-700" x-text="selectedCase?.settlement_mode"></p>
                                </div>
                                <div>
                                    <label class="text-[10px] font-black uppercase text-gray-400 tracking-widest">Resolver</label>
                                    <p class="text-sm font-semibold text-gray-700" x-text="selectedCase?.ResolverName"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('liabilityApp', () => ({
                selectedCase: null,
                // Mock data matching the structure from your original input
                liabilities: [
                    {
                        damage_id: "6",
                        session_id: "121",
                        Item_Name: "Caliper",
                        damage_type: "Broken",
                        qty_damaged: "1",
                        status: "Resolved",
                        notes: "broken parang ako",
                        logged_at: "Mar 21, 2026",
                        settlement_mode: "replacement",
                        ResolverName: "Admin User"
                    }
                ]
            }));
        });
    </script>
</body>
</html>
