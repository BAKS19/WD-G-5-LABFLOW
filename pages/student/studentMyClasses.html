<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Classes Dashboard</title>

<link rel="stylesheet" href="studentMyClasses.css">
</head>

<body>

<div class="main">
    <div class="left">
        <h2>My <span class="orange">Classes.</span></h2>
        <p style="color:#94a3b8; font-size:12px;">Select a class to view its activities.</p>
        <br>
        <div id="emptyClasses" class="card" style="display:none;">No classes available.</div>
        <div id="classList" class="class-list"></div>
    </div>

    <div class="right sidebar">
        <div id="emptyState" class="empty">Select a Class</div>

        <div id="details" class="card details">
            <h3 id="dName"></h3>
            <p id="dTeacher" style="color:#94a3b8; font-size:12px;"></p>

            <br>

            <div class="stats">
                <div class="stat">
                    <div class="label">Semester</div>
                    <div id="dSemester" class="value"></div>
                </div>
                <div class="stat">
                    <div class="label">Section</div>
                    <div id="dSection" class="value"></div>
                </div>
                <div class="stat">
                    <div class="label">Activities</div>
                    <div id="dActivities" class="value"></div>
                </div>
            </div>

            <br>

            <div class="status-box" id="statusBox"></div>

            <br>

            <div id="deadlines"></div>

            <br>

            <button class="btn" id="openModalBtn">View All Activities</button>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="activityModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Activities</h3>
        <ul id="activityListItems" style="padding-left: 20px;"></ul>
        <button class="btn" id="closeModalBtn">Close</button>
    </div>
</div>

<script src="studentMyClasses.js"></script>
</body>
</html>
