```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Hub</title>

<style>
body {
    font-family: Arial;
    background: #f5f6f8;
    padding: 20px;
}

/* HEADER */
.title { font-size: 28px; font-weight: bold; }

/* LAYOUT */
.main {
    display: flex;
    gap: 20px;
}

/* GRID */
.grid {
    flex: 2;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 15px;
}

/* CARD */
.item-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid #ddd;
}
.item-card:hover { border-color: orange; }

/* FORM */
.form-box {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 12px;
}
.form-box input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}
.form-box button {
    width: 100%;
    padding: 10px;
    background: orange;
    color: white;
    border: none;
    cursor: pointer;
}

/* DROP */
.drop-zone {
    margin-top: 20px;
    padding: 20px;
    border: 2px dashed #ccc;
    text-align: center;
    border-radius: 12px;
}
</style>
</head>

<body>

<h2 class="title">Inventory Hub</h2>

<input id="searchInput" placeholder="Search..." />

<div class="main">

    <!-- ITEMS -->
    <div id="itemContainer" class="grid"></div>

    <!-- RIGHT PANEL -->
    <div>

        <!-- FORM -->
        <div class="form-box">
            <h3>Add Item</h3>

            <input id="name" placeholder="Item name">
            <input id="category" placeholder="Category">
            <input id="available" type="number" placeholder="Available qty">
            <input id="total" type="number" placeholder="Total qty">
            <input id="image" placeholder="Image URL">

            <button onclick="addItem()">Add Item</button>
        </div>

        <!-- DROP ZONE -->
        <div id="dropZone" class="drop-zone">
            <h3 id="dzTitle">Select Item</h3>
            <p id="dzDesc">Details will show here</p>
        </div>

    </div>

</div>

<script>

/* DATA */
let items = [
{ id:1,name:"Beaker",category:"Glassware",available:15,total:20,unit:"pcs",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Beaker_100ml.jpg/200px-Beaker_100ml.jpg"}
];

/* ELEMENTS */
const container = document.getElementById("itemContainer");
const dropTitle = document.getElementById("dzTitle");
const dropDesc = document.getElementById("dzDesc");

/* RENDER */
function render(list){
    container.innerHTML = "";

    list.forEach(item=>{
        const card = document.createElement("div");
        card.className = "item-card";
        card.draggable = true;

        card.innerHTML = `
            <img src="${item.img}" width="80"><br>
            <b>${item.name}</b><br>
            ${item.category}<br>
            ${item.available}/${item.total}
        `;

        card.onclick = ()=> showDetails(item);

        card.ondragstart = e=>{
            e.dataTransfer.setData("id", item.id);
        };

        container.appendChild(card);
    });
}

/* ADD ITEM */
function addItem(){
    const name = document.getElementById("name").value;
    const category = document.getElementById("category").value;
    const available = document.getElementById("available").value;
    const total = document.getElementById("total").value;
    const image = document.getElementById("image").value;

    if(!name || !category) return alert("Fill required fields");

    const newItem = {
        id: Date.now(),
        name,
        category,
        available: Number(available),
        total: Number(total),
        unit:"pcs",
        img: image || "https://via.placeholder.com/100"
    };

    items.push(newItem);
    render(items);

    // clear form
    document.getElementById("name").value = "";
    document.getElementById("category").value = "";
    document.getElementById("available").value = "";
    document.getElementById("total").value = "";
    document.getElementById("image").value = "";
}

/* DETAILS */
function showDetails(item){
    dropTitle.textContent = item.name;
    dropDesc.textContent = `${item.category} • ${item.available}/${item.total}`;
}

/* DROP */
const dropZone = document.getElementById("dropZone");

dropZone.ondragover = e=> e.preventDefault();

dropZone.ondrop = e=>{
    const id = e.dataTransfer.getData("id");
    const item = items.find(i=>i.id == id);
    if(item) showDetails(item);
};

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e=>{
    const val = e.target.value.toLowerCase();

    const filtered = items.filter(i =>
        i.name.toLowerCase().includes(val) ||
        i.category.toLowerCase().includes(val)
    );

    render(filtered);
});

/* INIT */
render(items);

</script>

</body>
</html>
