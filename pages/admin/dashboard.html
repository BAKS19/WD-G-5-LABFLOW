<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SNHS</title>
    <link rel="stylesheet" href="../../assets/CSS/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <div id="sidebar-placeholder" style="display: contents;"></div>

        <div class="main-content">
            <header class="glass-header">
                <span class="header-title">Analytics Dashboard</span>
                <div class="user-profile">
                    <span class="user-name">Mark Ando</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <main class="container animate-reveal">
                <div class="page-header">
                    <h2>Analytics Overview</h2>
                    <p>Key laboratory performance metrics and status.</p>
                </div>

                <div class="kpi-grid">
                    <div class="kpi-card" data-target="graphs-stock">
                        <div class="icon-wrapper icon-orange"><i class="fa-solid fa-boxes-stacked"></i></div>
                        <div>
                            <p id="val-total-stock" class="kpi-value">0</p>
                            <p class="kpi-label">Total Stock</p>
                        </div>
                    </div>

                    <div class="kpi-card" data-target="graphs-users">
                        <div class="icon-wrapper icon-orange"><i class="fa-solid fa-users"></i></div>
                        <div>
                            <p id="val-total-users" class="kpi-value">0</p>
                            <p class="kpi-label">Users</p>
                        </div>
                    </div>

                    <div class="kpi-card active-card" data-target="graphs-borrow">
                        <div class="icon-wrapper icon-amber"><i class="fa-solid fa-clock"></i></div>
                        <div>
                            <p id="val-pending-reqs" class="kpi-value">0</p>
                            <p class="kpi-label">Borrow Sessions</p>
                        </div>
                    </div>

                    <div class="kpi-card" data-target="graphs-damages">
                        <div class="icon-wrapper icon-amber"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        <div>
                            <p id="val-open-damages" class="kpi-value">0</p>
                            <p class="kpi-label">Damages</p>
                        </div>
                    </div>
                </div>

                <div id="visual-analytics" class="visual-analytics">
                    <div id="graphs-stock" class="graph-row graph-row-mixed" style="order: 1;">
                        <div class="chart-card col-3">
                            <h3>Composition</h3>
                            <div class="chart-height-lg"><canvas id="inventoryChart"></canvas></div>
                        </div>
                        <div class="chart-card col-7">
                            <h3>Lowest Stock Items</h3>
                            <div class="chart-height-lg"><canvas id="lowestStockChart"></canvas></div>
                        </div>
                    </div>

                    <div id="graphs-users" class="graph-row" style="order: 1;">
                        <div class="chart-card">
                            <h3>Class Demographics</h3>
                            <div class="chart-height-lg"><canvas id="userPopulationChart"></canvas></div>
                        </div>
                    </div>

                    <div id="graphs-borrow" class="graph-row" style="order: 0;">
                        <div class="chart-card">
                            <h3>Borrowing Activity</h3>
                            <div class="chart-height-md"><canvas id="activityChart"></canvas></div>
                        </div>
                    </div>

                    <div id="graphs-damages" class="graph-row graph-row-half" style="order: 1;">
                        <div class="chart-card">
                            <h3>Overall Damage Status</h3>
                            <div class="chart-height-md"><canvas id="damageOverviewChart"></canvas></div>
                        </div>
                        <div class="chart-card">
                            <h3>Unresolved Cases</h3>
                            <div class="chart-height-md"><canvas id="unresolvedDetailChart"></canvas></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Load sidebar logic -->
    <script src="../../assets/CSS/sidebar.js"></script>
    <script>
        // Fetch and inject the sidebar component
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../includes/sidebar.html')
                .then(response => {
                    if (!response.ok) throw new Error('HTTP error ' + response.status);
                    return response.text();
                })
                .then(html => {
                    document.getElementById('sidebar-placeholder').innerHTML = html;
                    if (typeof initializeSidebar === 'function') initializeSidebar();
                })
                .catch(err => console.error('Error fetching sidebar:', err));
        });

        const mockData = {
            total_stock: 1250, total_users: 48, pending_reqs: 12, open_damages: 5,
            categories: [{ name: 'Glassware', count: 45 }, { name: 'Chemicals', count: 32 }, { name: 'Tools', count: 18 }],
            sessions: [{ label: 'Pending', count: 12 }, { label: 'Approved', count: 25 }, { label: 'Completed', count: 84 }],
            lowStock: [{ name: 'Beaker', qty: 2 }, { name: 'Ethanol', qty: 1 }, { name: 'Gloves', qty: 10 }],
            classes: [{ name: 'STEM 11-A', count: 35 }, { name: 'STEM 12-B', count: 28 }]
        };

        function initCharts() {
            document.getElementById('val-total-stock').innerText = mockData.total_stock;
            document.getElementById('val-total-users').innerText = mockData.total_users;
            document.getElementById('val-pending-reqs').innerText = mockData.pending_reqs;
            document.getElementById('val-open-damages').innerText = mockData.open_damages;

            new Chart(document.getElementById('inventoryChart'), {
                type: 'radar',
                data: {
                    labels: mockData.categories.map(c => c.name),
                    datasets: [{ data: mockData.categories.map(c => c.count), backgroundColor: 'rgba(249, 115, 22, 0.2)', borderColor: '#f97316' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('activityChart'), {
                type: 'line',
                data: {
                    labels: mockData.sessions.map(s => s.label),
                    datasets: [{ data: mockData.sessions.map(s => s.count), borderColor: '#f97316', tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('lowestStockChart'), {
                type: 'bar',
                data: {
                    labels: mockData.lowStock.map(i => i.name),
                    datasets: [{ data: mockData.lowStock.map(i => i.qty), backgroundColor: '#f97316' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('userPopulationChart'), {
                type: 'bar',
                data: {
                    labels: mockData.classes.map(c => c.name),
                    datasets: [{ label: 'Students', data: mockData.classes.map(c => c.count), backgroundColor: '#06b6d4' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            const cards = document.querySelectorAll('.kpi-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    cards.forEach(c => c.classList.remove('active-card'));
                    card.classList.add('active-card');
                    const target = card.dataset.target;
                    document.querySelectorAll('.graph-row').forEach(row => {
                        row.style.order = (row.id === target) ? '0' : '1';
                    });
                });
            });
        });
    </script>
</body>
</html>
