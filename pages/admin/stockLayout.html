```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab Shelf System - Stock Room</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>🧪 Inventory</h3>

        <input type="text" id="search" placeholder="Search items..." />

        <div class="filter-group">
            <b>Filter by Type</b>
            <button data-type="all" class="filter-active">All</button>
            <button data-type="Consumable">Consumable</button>
            <button data-type="Non-Consumable">Non-Consumable</button>
        </div>

        <div class="filter-group">
            <b>Filter by Category</b>
            <select id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="Glassware">Glassware (Shelf A)</option>
                <option value="Chemicals">Chemicals (Shelf B)</option>
                <option value="Equipment">Equipment (Shelf C)</option>
                <option value="Safety">Safety (Shelf D)</option>
                <option value="Biologicals">Biologicals (Shelf E)</option>
            </select>
        </div>

        <div id="item-list"></div>
    </div>

    <!-- MAIN AREA -->
    <div class="canvas-container">

        <div class="layout-header">Stock Room Layout</div>

        <!-- NEW: SHELF GRID -->
        <div class="shelf-grid">

            <div class="shelf-box" data-id="Shelf A">Shelf A<br><small>Glassware</small></div>
            <div class="shelf-box" data-id="Shelf B">Shelf B<br><small>Chemicals</small></div>
            <div class="shelf-box large" data-id="Shelf C">Shelf C<br><small>Equipment</small></div>
            <div class="shelf-box" data-id="Shelf D">Shelf D<br><small>Safety</small></div>
            <div class="shelf-box" data-id="Shelf E">Shelf E<br><small>Biologicals</small></div>

        </div>

        <div id="info-box">
            <strong>Storage Info</strong><br>
            Select a shelf or item to view details.
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
```
